<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500">
  <!-- Placeholder hero portrait. Replace this file with a real photo
       (recommended: assets/images/hero-photo.jpg, 4:5 ratio) and update
       the <img src> in index.html accordingly. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0f16"/>
      <stop offset="100%" stop-color="#161a24"/>
    </linearGradient>
    <linearGradient id="mono" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4ff3f"/>
      <stop offset="100%" stop-color="#35d0ff"/>
    </linearGradient>
  </defs>
  <rect width="400" height="500" fill="url(#bg)"/>
  <!-- faint court lines -->
  <g stroke="#ffffff" stroke-opacity="0.06" stroke-width="2" fill="none">
    <rect x="30" y="60" width="340" height="420"/>
    <line x1="30" y1="270" x2="370" y2="270"/>
    <line x1="200" y1="60" x2="200" y2="480"/>
    <rect x="90" y="120" width="220" height="300"/>
  </g>
  <circle cx="200" cy="230" r="70" fill="none" stroke="url(#mono)" stroke-width="1.5" opacity="0.6"/>
  <text x="200" y="250" font-family="Space Grotesk, Arial, sans-serif" font-size="72" font-weight="700" text-anchor="middle" fill="url(#mono)">MV</text>
  <text x="200" y="410" font-family="Arial, sans-serif" font-size="13" letter-spacing="2" text-anchor="middle" fill="#6b7280">PHOTO PLACEHOLDER — REPLACE ME</text>
</svg>
